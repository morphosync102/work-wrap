# =====================
# Workday 設定
# =====================
workday:
  start_time: "09:00"    # 出勤時刻（固定）
  core_hours: 7.5        # コアタイム（時間）
  break_hours: 1.0       # 休憩時間（時間）
  # 定時退勤 = 09:00 + 7.5h + 1.0h = 17:30
  # 残業3h退勤 = 09:00 + 7.5h + 3.0h + 1.0h = 20:30

# =====================
# CATW Excel 設定
# =====================
catw:
  excel:
    path: "/path/to/マクロ/FY26_03月_CATW入力マクロ.xlsm"
    sheet_name: "CATW"
    macro_name: "OpenCATW"   # Excel内VBAマクロ名（Edgeをデバッグモードで起動するマクロ）
    cdp_port: 9222           # EdgeデバッグポートのポートTCP番号
    # シート構造（変更不要）:
    #   C4=Year, C5=Month
    #   週ブロック開始行: Week1=7, Week2=19, Week3=31, Week4=43, Week5=55, Week6=67
    #   各ブロック: C=WBS / D=Description / E=AA Type / F=Memo / G=Week合計 / H-N=月〜日

# =====================
# PSA Excel 設定（CATWと同じファイル内の別シート）
# =====================
psa:
  excel:
    path: "/path/to/マクロ/FY26_03月_CATW入力マクロ.xlsm"
    sheet_name: "PSA"

# =====================
# Concur（交通費）設定
# =====================
concur:
  excel:
    path: "/path/to/マクロ/FY26_03月_CATW入力マクロ.xlsm"
    sheet_name: "Concur"
    # 列構造: A=日付 / B=交通手段 / C=金額 / D=コメント / E=Business Purpose / F=入力ステータス
    header_row: 1
    data_start_row: 2
