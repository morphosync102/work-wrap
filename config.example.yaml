# work-wrap 設定ファイル
# このファイルをコピーして config.yaml を作成してください:
#   cp config.example.yaml config.yaml

# =====================
# プロジェクト設定（CATW）
# =====================
# 案件が終了したら該当エントリを削除してください
projects:
  - name: "ProjectA"
    wbs: "A-001"           # WBSコード（案件の一意識別子）
    catw_column: "B"       # CATW Excel 転記先列（後で設定）
  - name: "ProjectB"
    wbs: "B-002"
    catw_column: "C"
  - name: "ProjectC"
    wbs: "C-003"
    catw_column: "D"

# =====================
# Attend/Absence Type 選択肢
# =====================
# TODO: 今後選択肢を追加予定（CATWの業務種別）
attend_absence_types:
  - "開発"
  - "設計"
  - "レビュー"
  - "打ち合わせ"
  - "社内業務"

# =====================
# PSA 設定
# =====================
# TODO: PSAのフォーマット確認後に種別を追加
psa:
  types: []              # 例: ["内勤", "教育", "祝日", "有給"]
  excel:
    path: null           # PSA提出用Excelのパス（後で設定）

# =====================
# Workday 設定
# =====================
workday:
  start_time: "09:00"    # 出勤時刻（固定）
  core_hours: 7.5        # コアタイム（時間）
  break_hours: 1.0       # 休憩時間（時間）
  # 定時退勤 = start_time + core_hours + break_hours = 17:30
  # 残業あり退勤 = start_time + core_hours + overtime + break_hours

# =====================
# CATW Excel 設定
# =====================
# TODO: CATWのExcelフォーマット確認後に設定
catw:
  excel:
    path: null           # CATW提出用Excelのパス
    sheet_name: null     # シート名（省略時はアクティブシート）
    date_column: "A"
    data_start_row: 2

# =====================
# Concur（交通費）設定
# =====================
# TODO: ConcurのExcelフォーマット確認後に設定
concur:
  excel:
    path: null           # Concur提出用Excelのパス
    sheet_name: null
    date_column: "A"
    transport_column: "B"
    amount_column: "C"
    comment_column: "D"
    business_purpose_column: "E"
    data_start_row: 2
