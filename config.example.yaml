# work-wrap 設定ファイル
# このファイルをコピーして config.yaml を作成してください:
#   cp config.example.yaml config.yaml

# =====================
# プロジェクト設定（CATW / PSA 共通）
# =====================
# 案件が終了したら該当エントリを削除してください
projects:
  - name: "ProjectA"                   # MD ファイルでの表示名（列名）
    wbs: "JP3-XXXXX.XX.XX.XX"          # WBS element（CATWのWBSコード）
    description: "412 Implementation"  # Description 列（省略時は name を使用）
    aa_type: "412 Implementation"      # Attend/Absence Type（下記一覧から選択）
    memo: "プロジェクトA"               # Memo / 案件名等
  - name: "ProjectB"
    wbs: "JP3-YYYYY.XX.XX.XX"
    description: "431 Project Mgmt"
    aa_type: "431 Project Mgmt"
    memo: "プロジェクトB"

# PSA 専用エントリ（案件外工数・祝日等）
psa_entries:
  - name: "CompanyHoliday"
    wbs: "FY26H1 - Self - HPE Corp/Bank Holidays"
    aa_type: "110 Company Holiday"
    memo: ""
  - name: "Vacation"
    wbs: "FY26H1 - Self - Personal"
    aa_type: "120 Vacation,PersHol"
    memo: ""
  - name: "Internal"
    wbs: "FY26H1 - Self - Internal"
    aa_type: "700 General Attendance"
    memo: "社内業務"

